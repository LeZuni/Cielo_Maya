<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cielo Maya - Iniciar Sesión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/Style.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>
    <div class="pagina-form">
        <div class="tarjeta">
            <img width="150px" src="cielo maya 3d.png" alt="Logo ACME AIR" class="logo">

            <h1 class="titulo">Cielo Maya</h1>
            <p class="subtitulo">Inicia sesión para continuar</p>

            <form>
                <div class="grupo">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" placeholder="tu@correo.com">
                </div>

                <div class="grupo">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Contraseña">
                </div>

                <div class="grupo-checkbox">
                    <input type="checkbox" id="recordar" name="recordar">
                    <label for="recordar">Recordar mis datos</label>
                </div>

                <a href="menu.html" class="btn-primario">Ingresar</a>
            </form>

            <div class="enlaces-form">
        <p>¿No tienes cuenta? <a href="registro.html">Crear cuenta</a></p>
        <p><a href="recuperar.html">¿Has olvidado tu contraseña?</a></p>
      </div>

    </div>
  </div>

</body>

</html>

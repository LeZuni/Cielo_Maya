<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cielo Maya - Mis Vuelos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

    <div class="pagina-app">

        <header class="encabezado">
            <div class="encabezado-info">
                <p>Cielo Maya</p>
                <h2>Mis vuelos</h2>
            </div>
            <a href="index.html" class="btn-pequeno">Cerrar sesión</a>
        </header>

        <main class="contenido">

            <div class="lista-vuelos">

                <div class="vuelo-card">
                    <div class="vuelo-card-icono">
                        <img src="plane.svg" alt="Vuelo" class="icono-svg">
                    </div>
                    <div class="vuelo-card-tiempo">
                        <span class="vuelo-horario">GUA → BOG</span>
                        <span class="vuelo-duracion">CM 201 · 15 jun · 06:10 hrs</span>
                        <span class="vuelo-duracion">Reserva: CM2024A</span>
                    </div>
                    <div class="vuelo-card-precio">
                        <span class="estado estado-confirmado">Confirmado</span>
                    </div>
                </div>

                <div class="vuelo-card">
                    <div class="vuelo-card-icono">
                        <img src="plane.svg" alt="Vuelo" class="icono-svg">
                    </div>
                    <div class="vuelo-card-tiempo">
                        <span class="vuelo-horario">BOG → GUA</span>
                        <span class="vuelo-duracion">CM 202 · 22 jun · 15:30 hrs</span>
                        <span class="vuelo-duracion">Reserva: CM2024B</span>
                    </div>
                    <div class="vuelo-card-precio">
                        <span class="estado estado-confirmado">Confirmado</span>
                    </div>
                </div>

                <div class="vuelo-card">
                    <div class="vuelo-card-icono">
                        <img src="plane.svg" alt="Vuelo" class="icono-svg">
                    </div>
                    <div class="vuelo-card-tiempo">
                        <span class="vuelo-horario">GUA → MDE</span>
                        <span class="vuelo-duracion">CM 415 · 10 jul · 09:30 hrs</span>
                        <span class="vuelo-duracion">Reserva: CM2024C</span>
                    </div>
                    <div class="vuelo-card-precio">
                        <span class="estado estado-pendiente">Pendiente</span>
                    </div>
                </div>

            </div>

            <a href="menu.html" class="link-volver">← Volver al menú</a>

        </main>

    </div>

</body>

</html>

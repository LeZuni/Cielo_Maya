<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cielo Maya - Check-In</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

    <div class="pagina-app">
        <header class="encabezado">
            <div class="encabezado-info">
                <p>Cielo_Maya</p>
                <h2>Check-In</h2>
            </div>
            <a href="index.html" class="btn-pequeno">Cerrar sesión</a>
        </header>
        <main class="contenido">

            <div class="tarjeta" style="max-width: 500px;">

                <p class="subtitulo">Ingresa tu número de vuelo o reserva para hacer el check-in</p>

                <form>

                    <div class="grupo">
                        <label for="num-vuelo">Número de vuelo</label>
                        <input type="text" id="num-vuelo" name="num-vuelo" placeholder="Ej: AM 401">
                    </div>

                    <div class="grupo">
                        <label for="num-reserva">Número de reserva</label>
                        <input type="text" id="num-reserva" name="num-reserva" placeholder="Ej: ABC123">
                    </div>

                    <a href="menu.html" class="btn-primario">Guardar</a>

                </form>

            </div>

            <a href="menu.html" class="link-volver">← Volver al menú</a>

        </main>

    </div>

</body>

</html>

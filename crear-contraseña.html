!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACME AIR - Crear Contraseña</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

    <div class="pagina-form">
        <div class="tarjeta">

            <img src="cielo maya 3d.png" alt="Logo ACME AIR" class="logo">

            <h1 class="titulo">Crear contraseña</h1>
            <p class="subtitulo">Elige una contraseña segura para tu cuenta</p>

            <form>
                <div class="grupo">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres">
                </div>
                <div class="grupo">
                    <label for="repetir">Repetir contraseña</label>
                    <input type="password" id="repetir" name="repetir" placeholder="Escribe la contraseña otra vez">
                </div>

                <a href="menu.html" class="btn-primario">Guardar</a>
            </form>

        </div>
    </div>

</body>

</html>

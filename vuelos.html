<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cielo Maya - Vuelos Disponibles</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

    <div class="pagina-app">

        <header class="encabezado">
            <div class="encabezado-info">
                <p>Cielo Maya</p>
                <h2>Vuelos disponibles</h2>
            </div>
            <a href="index.html" class="btn-pequeno">Cerrar sesión</a>
        </header>

        <main class="contenido">

            <p class="ruta-busqueda">Ciudad de Guatemala → Bogotá</p>
            <p class="fecha-busqueda">15 de junio · 1 pasajero</p>

            <div class="lista-vuelos">

                <div class="vuelo-card">
                    <div class="vuelo-card-icono">
                        <img src="plane.svg" alt="Vuelo" class="icono-svg">
                    </div>
                    <div class="vuelo-card-tiempo">
                        <span class="vuelo-horario">06:10 - 10:45</span>
                        <span class="vuelo-duracion">4h 35 min</span>
                    </div>
                    <div class="vuelo-card-precio">
                        <span class="vuelo-codigo">CM 201</span>
                        <span class="vuelo-monto">GT-Q 1,850</span>
                    </div>
                </div>

                <div class="vuelo-card">
                    <div class="vuelo-card-icono">
                        <img src="plane.svg" alt="Vuelo" class="icono-svg">
                    </div>
                    <div class="vuelo-card-tiempo">
                        <span class="vuelo-horario">09:30 - 14:20</span>
                        <span class="vuelo-duracion">4h 50 min</span>
                    </div>
                    <div class="vuelo-card-precio">
                        <span class="vuelo-codigo">CM 415</span>
                        <span class="vuelo-monto">GT-Q 2,100</span>
                    </div>
                </div>

                <div class="vuelo-card">
                    <div class="vuelo-card-icono">
                        <img src="plane.svg" alt="Vuelo" class="icono-svg">
                    </div>
                    <div class="vuelo-card-tiempo">
                        <span class="vuelo-horario">14:00 - 18:40</span>
                        <span class="vuelo-duracion">4h 40 min</span>
                    </div>
                    <div class="vuelo-card-precio">
                        <span class="vuelo-codigo">CM 836</span>
                        <span class="vuelo-monto">GT-Q 1,650</span>
                    </div>
                </div>

            </div>

            <a href="menu.html" class="btn-primario" style="max-width: 500px;">Volver al menú</a>

        </main>

    </div>

</body>

</html>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cielo Maya - Buscar Vuelos</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>
    <div class="pagina-app">

        <header class="encabezado">
            <div class="encabezado-info">
                <p>Cielo Maya</p>
                <h2>Buscar vuelos</h2>
            </div>
            <a href="index.html" class="btn-pequeno">Cerrar sesión</a>
        </header>

        <main class="contenido">

            <div class="tarjeta" style="max-width: 500px;">

                <form>
                    <div class="grupo">
                        <label for="origen">Origen</label>
                        <input type="text" id="origen" name="origen" placeholder="Ej: Ciudad de Guatemala (GUA)">
                    </div>

                    <div class="grupo">
                        <label for="destino">Destino</label>
                        <input type="text" id="destino" name="destino" placeholder="Ej: Bogotá (BOG)">
                    </div>
                    <div class="grupo">
                        <label for="fecha-salida">Fecha de salida</label>
                        <input type="date" id="fecha-salida" name="fecha-salida">
                    </div>

                    <div class="grupo">
                        <label for="fecha-regreso">Fecha de regreso</label>
                        <input type="date" id="fecha-regreso" name="fecha-regreso">
                    </div>

                    <div class="grupo-checkbox">
                        <input type="checkbox" id="solo-ida" name="solo-ida">
                        <label for="solo-ida">Solo ida (sin fecha de regreso)</label>
                    </div>

                    <a href="vuelos.html" class="btn-primario">Buscar</a>

                </form>

            </div>

            <a href="menu.html" class="link-volver">← Volver al menú</a>

        </main>

    </div>

</body>

</html>
